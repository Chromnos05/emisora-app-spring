<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Emisora</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0" th:text="${emisora.id == null ? 'Nueva Emisora' : 'Editar Emisora'}"></h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/emisoras/guardar}" th:object="${emisora}" method="post">
                        
                        <input type="hidden" th:field="*{id}" />

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Nombre</label>
                                <input type="text" class="form-control" th:field="*{nombre}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Canal</label>
                                <input type="text" class="form-control" th:field="*{canal}">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Banda FM</label>
                                <input type="text" class="form-control" th:field="*{bandaFm}" placeholder="Ej. 99.5 MHz">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Banda AM</label>
                                <input type="text" class="form-control" th:field="*{bandaAm}" placeholder="Ej. 1020 kHz">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label">N° Locutores</label>
                                <input type="number" class="form-control" th:field="*{numLocutores}">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Género</label>
                                <input type="text" class="form-control" th:field="*{genero}">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">País</label>
                                <input type="text" class="form-control" th:field="*{pais}">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Horario</label>
                                <input type="text" class="form-control" th:field="*{horario}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Patrocinador</label>
                                <input type="text" class="form-control" th:field="*{patrocinador}">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">N° Programas</label>
                                <input type="number" class="form-control" th:field="*{numProgramas}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">N° Ciudades</label>
                                <input type="number" class="form-control" th:field="*{numCiudades}">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Descripción</label>
                            <textarea class="form-control" th:field="*{descripcion}" rows="3"></textarea>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a th:href="@{/emisoras}" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-success">Guardar Emisora</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
