<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Emisoras</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Listado de Emisoras</h2>
        <a th:href="@{/emisoras/nuevo}" class="btn btn-primary">Registrar Nueva Emisora</a>
    </div>

    <div class="table-responsive bg-white p-3 rounded shadow-sm">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Canal</th>
                    <th>Banda FM</th>
                    <th>Banda AM</th>
                    <th>Género</th>
                    <th>País</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="emisora : ${emisoras}">
                    <td th:text="${emisora.id}"></td>
                    <td th:text="${emisora.nombre}"></td>
                    <td th:text="${emisora.canal}"></td>
                    <td th:text="${emisora.bandaFm}"></td>
                    <td th:text="${emisora.bandaAm}"></td>
                    <td th:text="${emisora.genero}"></td>
                    <td th:text="${emisora.pais}"></td>
                    <td>
                        <a th:href="@{/emisoras/editar/{id}(id=${emisora.id})}" class="btn btn-sm btn-warning">Editar</a>
                        <a th:href="@{/emisoras/eliminar/{id}(id=${emisora.id})}" 
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('¿Estás seguro de eliminar esta emisora?');">Eliminar</a>
                    </td>
                </tr>
                <tr th:if="${emisoras.empty}">
                    <td colspan="8" class="text-center text-muted">No hay emisoras registradas en el sistema.</td>
                </tr>
            </tbody>
        </table>
    </div>
    
    <div class="mt-3">
        <a th:href="@{/usuarios}" class="btn btn-outline-secondary">Ir a Gestión de Usuarios</a>
    </div>
</div>

</body>
</html>
